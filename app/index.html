<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>DawrBa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --meta: #94a3b8;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --red: #b91c1c;
      --green: #0d7c4b;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    input, select, button, textarea { font-family: inherit; }
    .page {
      display: none;
      min-height: 100vh;
    }
    .page.active { display: block; }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .header-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .header-btn:hover { background: rgba(255,255,255,0.25); }

    /* Content area */
    .content {
      padding: 16px 20px 24px;
      max-width: 640px;
      margin: 0 auto;
    }

    /* Auth card */
    .auth-card {
      max-width: 400px;
      margin: 60px auto 0;
      background: var(--surface);
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 8px 24px rgba(15,23,42,0.06);
      border: 1px solid var(--border);
    }
    .auth-card .logo {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-align: center;
      margin-bottom: 24px;
      color: var(--text);
    }
    .auth-card .logo .dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--blue);
      margin: 0 2px 2px 4px;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.2);
    }

    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.95rem;
      background: #f8fafc;
      outline: none;
      transition: border-color 0.18s;
    }
    .field input:focus, .field select:focus {
      border-color: var(--blue);
      background: #fff;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--blue);
      color: white;
    }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: #f8fafc; }
    .btn-green {
      background: var(--green);
      color: white;
    }
    .btn-green:hover { opacity: 0.9; }
    .btn-red {
      background: #fef2f2;
      color: var(--red);
      border: 1px solid #fecaca;
    }
    .btn-red:hover { background: #fee2e2; }
    .btn-block { width: 100%; }
    .btn-sm { padding: 8px 14px; font-size: 0.85rem; min-height: 36px; }

    .auth-toggle {
      text-align: center;
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--meta);
    }
    .auth-toggle button {
      background: none;
      border: none;
      color: var(--blue);
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0;
    }
    .auth-error {
      color: var(--red);
      font-size: 0.85rem;
      text-align: center;
      margin-top: 10px;
      display: none;
    }

    /* Search + Sort bar */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .search-wrap {
      flex: 1;
      position: relative;
    }
    .search-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--meta);
      font-size: 0.9rem;
    }
    .search-wrap input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.9rem;
      background: var(--surface);
      outline: none;
    }
    .search-wrap input:focus { border-color: var(--blue); }
    .sort-wrap select {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.85rem;
      background: var(--surface);
      outline: none;
      cursor: pointer;
    }

    /* Customer card */
    .customer-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: box-shadow 0.18s;
    }
    .customer-card:hover { box-shadow: 0 4px 12px rgba(15,23,42,0.06); }
    .customer-card:active { transform: scale(0.99); }
    .cc-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 0.85rem;
      color: white;
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      flex-shrink: 0;
    }
    .cc-name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cc-meta {
      font-size: 0.78rem;
      color: var(--meta);
      margin-top: 2px;
    }
    .cc-balance {
      font-weight: 700;
      font-size: 1rem;
      color: var(--red);
      white-space: nowrap;
    }
    .cc-balance.zero { color: var(--green); }

    /* Back button */
    .back-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .back-btn {
      background: none;
      border: none;
      color: var(--meta);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
    }
    .back-row h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0;
    }

    /* Detail */
    .detail-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .detail-phone {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .detail-balance {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--red);
    }
    .detail-balance.zero { color: var(--green); }
    .detail-actions {
      display: flex;
      gap: 10px;
      margin: 16px 0;
      flex-wrap: wrap;
    }
    .detail-actions .btn { flex: 1; }

    /* Transaction list */
    .tx-list { margin-top: 4px; }
    .tx-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .tx-item:last-child { border-bottom: none; }
    .tx-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tx-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 0.75rem;
    }
    .tx-icon.credit { background: #ecfdf5; color: var(--green); }
    .tx-icon.pay { background: #fef2f2; color: var(--red); }
    .tx-amount {
      font-weight: 700;
      font-size: 0.95rem;
    }
    .tx-amount.credit { color: var(--green); }
    .tx-amount.pay { color: var(--red); }
    .tx-date {
      font-size: 0.78rem;
      color: var(--meta);
    }
    .tx-note {
      font-size: 0.82rem;
      color: var(--muted);
    }

    /* Shop name setup */
    .setup-card {
      max-width: 400px;
      margin: 80px auto 0;
      background: var(--surface);
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 8px 24px rgba(15,23,42,0.06);
      border: 1px solid var(--border);
      text-align: center;
    }
    .setup-card h2 {
      font-size: 1.2rem;
      margin-bottom: 8px;
    }
    .setup-card p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* Toast */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(16px);
      background: rgba(15,23,42,0.9);
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.86rem;
      opacity: 0;
      pointer-events: none;
      transition: all 0.22s;
      z-index: 30;
      box-shadow: 0 10px 24px rgba(2,6,23,0.2);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--meta);
    }
    .empty i { font-size: 2rem; margin-bottom: 12px; }
    .empty p { font-size: 0.9rem; }

    /* Add customer form page */
    #addPage .content {
      max-width: 480px;
    }
    .add-extra {
      display: none;
      margin-top: 4px;
      padding: 12px;
      background: #f8fafc;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .add-extra.show { display: block; }
    .add-extra-toggle {
      background: none;
      border: none;
      color: var(--blue);
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 600;
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Loading spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (min-width: 768px) {
      .content { padding: 24px 40px; }
      .auth-card { margin-top: 100px; padding: 40px 32px; }
      .setup-card { margin-top: 120px; }
    }
  </style>
</head>
<body>

  <!-- ===== AUTH PAGE ===== -->
  <div class="page active" id="authPage">
    <div class="auth-card">
      <div class="logo">DawrBa<span class="dot"></span></div>
      <form id="authForm">
        <div class="field">
          <label for="authEmail">Email</label>
          <input type="email" id="authEmail" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="authPassword">Password</label>
          <input type="password" id="authPassword" placeholder="••••••••" required minlength="6" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="authSubmitBtn">Login</button>
        <div class="auth-error" id="authError"></div>
      </form>
      <div class="auth-toggle">
        <span id="authToggleLabel">Don't have an account?</span>
        <button type="button" id="authToggleBtn">Register</button>
      </div>
    </div>
  </div>

  <!-- ===== SHOP NAME SETUP ===== -->
  <div class="page" id="setupPage">
    <div class="setup-card">
      <h2>Name your shop</h2>
      <p>This will appear at the top of your dashboard.</p>
      <form id="setupForm">
        <div class="field">
          <input type="text" id="shopNameInput" placeholder="e.g. Shahid's Tea Stall" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Continue</button>
      </form>
    </div>
  </div>

  <!-- ===== DASHBOARD ===== -->
  <div class="page" id="dashPage">
    <div class="header">
      <h1 id="dashTitle">DawrBa</h1>
      <div class="header-actions">
        <button class="header-btn" id="addCustomerBtn" title="Add customer"><i class="fa-solid fa-plus"></i></button>
        <button class="header-btn" id="logoutBtn" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </div>
    <div class="content">
      <div class="toolbar">
        <div class="search-wrap">
          <i class="fa-solid fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search customers..." />
        </div>
        <div class="sort-wrap">
          <select id="sortSelect">
            <option value="name-asc">Name (A-Z)</option>
            <option value="name-desc">Name (Z-A)</option>
            <option value="balance-desc">Balance (High-Low)</option>
            <option value="balance-asc">Balance (Low-High)</option>
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
          </select>
        </div>
      </div>
      <div id="customerList"></div>
    </div>
  </div>

  <!-- ===== ADD CUSTOMER ===== -->
  <div class="page" id="addPage">
    <div class="header">
      <div class="back-row" style="margin:0;color:white;">
        <button class="back-btn" style="color:white;" id="addBackBtn"><i class="fa-solid fa-arrow-left"></i></button>
        <h1 style="font-size:1.1rem;font-weight:700;">Add Customer</h1>
      </div>
    </div>
    <div class="content">
      <form id="addForm">
        <div class="field">
          <label for="addName">Customer name</label>
          <input type="text" id="addName" placeholder="Full name" required />
        </div>
        <div class="field">
          <label for="addPhone">Phone number</label>
          <input type="tel" id="addPhone" placeholder="+91 98765 43210" />
        </div>
        <button type="button" class="add-extra-toggle" id="addExtraToggle"><i class="fa-solid fa-chevron-down"></i> Add initial credit</button>
        <div class="add-extra" id="addExtra">
          <div class="field">
            <label for="addAmount">Amount (₹)</label>
            <input type="number" id="addAmount" placeholder="0" min="0" step="1" />
          </div>
          <div class="field">
            <label for="addNote">Note</label>
            <input type="text" id="addNote" placeholder="e.g. Milk supply" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;" id="addSubmitBtn">Save Customer</button>
      </form>
    </div>
  </div>

  <!-- ===== CUSTOMER DETAIL ===== -->
  <div class="page" id="detailPage">
    <div class="header">
      <div class="back-row" style="margin:0;color:white;">
        <button class="back-btn" style="color:white;" id="detailBackBtn"><i class="fa-solid fa-arrow-left"></i></button>
        <h1 style="font-size:1.1rem;font-weight:700;">Customer</h1>
      </div>
    </div>
    <div class="content">
      <div class="detail-card">
        <h2 id="detailName" style="font-size:1.15rem;margin-bottom:4px;"></h2>
        <div class="detail-phone"><i class="fa-solid fa-phone"></i> <span id="detailPhone"></span></div>
        <div id="detailBalance" class="detail-balance">₹0</div>
        <div class="detail-actions">
          <button class="btn btn-green btn-sm" id="addCreditBtn"><i class="fa-solid fa-plus"></i> Add Credit</button>
          <button class="btn btn-red btn-sm" id="payBtn"><i class="fa-solid fa-arrow-right"></i> Pay</button>
          <button class="btn btn-secondary btn-sm" id="whatsappBtn"><i class="fa-brands fa-whatsapp"></i> Remind</button>
        </div>
      </div>
      <h3 style="font-size:0.95rem;font-weight:700;margin-bottom:8px;">Transactions</h3>
      <div class="tx-list" id="txList"></div>
    </div>
  </div>

  <!-- ===== ADD CREDIT / PAY MODAL ===== -->
  <div class="modal-backdrop" id="txModal">
    <div class="modal-sheet">
      <div class="modal-head">
        <h3 id="txModalTitle">Add Credit</h3>
        <button class="modal-close" id="closeTxModal"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="txForm">
        <div class="field">
          <label for="txAmount">Amount (₹)</label>
          <input type="number" id="txAmount" placeholder="0" required min="1" step="1" />
        </div>
        <div class="field">
          <label for="txNote">Note <span style="color:var(--meta);font-weight:400;">(optional)</span></label>
          <input type="text" id="txNote" placeholder="e.g. Weekly payment" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="txSubmitBtn">Save</button>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <style>
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(2,6,23,0.58);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 20;
      padding: 12px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.25s, visibility 0.25s;
    }
    .modal-backdrop.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .modal-sheet {
      width: min(100%, 480px);
      background: white;
      border-radius: 24px 24px 16px 16px;
      padding: 16px 20px 18px;
      box-shadow: 0 20px 45px rgba(2,6,23,0.2);
      transform: translateY(20px);
      opacity: 0;
      transition: transform 0.25s, opacity 0.25s;
    }
    .modal-backdrop.active .modal-sheet {
      transform: translateY(0);
      opacity: 1;
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .modal-head h3 { margin: 0; font-size: 1rem; }
    .modal-close {
      background: #f1f5f9;
      border: none;
      width: 34px; height: 34px;
      border-radius: 50%;
      cursor: pointer;
      color: var(--muted);
    }
    @media (min-width: 768px) {
      .modal-backdrop { align-items: center; }
      .modal-sheet { border-radius: 20px; }
    }
  </style>

  <script>
    // ─── Config ──────────────────────────────────────────────────────────
    const SUPABASE_URL = 'https://iqxzpjbmmwydrwhaztyi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxeHpwamJtbXd5ZHJ3aGF6dHlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0OTg3NjcsImV4cCI6MjA5OTA3NDc2N30.H_LNFsoY__rmuofV9h1tTn1gCp2xYBeNBckgX_EdCio';
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ─── State ───────────────────────────────────────────────────────────
    let currentUser = null;
    let currentProfile = null;
    let allCustomers = [];
    let selectedCustomerId = null;
    let isLoginMode = true;
    let txMode = 'credit';

    // ─── DOM refs ────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const pages = {
      auth: $('authPage'),
      setup: $('setupPage'),
      dash: $('dashPage'),
      add: $('addPage'),
      detail: $('detailPage'),
    };
    const toast = $('toast');
    let toastTimer;

    function showPage(name) {
      Object.values(pages).forEach(p => p.classList.remove('active'));
      pages[name].classList.add('active');
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ─── Auth ────────────────────────────────────────────────────────────
    async function checkSession() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        currentUser = session.user;
        await loadProfile();
        if (currentProfile && currentProfile.shop_name) {
          renderDashboard();
          showPage('dash');
        } else {
          showPage('setup');
        }
      } else {
        showPage('auth');
      }
    }

    async function loadProfile() {
      const { data } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
      currentProfile = data;
    }

    $('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = $('authEmail').value.trim();
      const password = $('authPassword').value;
      const btn = $('authSubmitBtn');
      const err = $('authError');
      err.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        if (isLoginMode) {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
          currentUser = data.user;
          await loadProfile();
          if (currentProfile && currentProfile.shop_name) {
            renderDashboard();
            showPage('dash');
          } else {
            showPage('setup');
          }
        } else {
          const { data, error } = await supabase.auth.signUp({ email, password });
          if (error) throw error;
          currentUser = data.user;
          showToast('Account created! Set your shop name.');
          showPage('setup');
        }
      } catch (err) {
        err.textContent = err.message;
        err.style.display = 'block';
      }
      btn.disabled = false;
      btn.textContent = isLoginMode ? 'Login' : 'Register';
    });

    $('authToggleBtn').addEventListener('click', () => {
      isLoginMode = !isLoginMode;
      $('authSubmitBtn').textContent = isLoginMode ? 'Login' : 'Register';
      $('authToggleLabel').textContent = isLoginMode ? "Don't have an account?" : 'Already have an account?';
      $('authToggleBtn').textContent = isLoginMode ? 'Register' : 'Login';
    });

    $('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      currentUser = null;
      currentProfile = null;
      allCustomers = [];
      showPage('auth');
    });

    // ─── Shop name setup ─────────────────────────────────────────────────
    $('setupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = $('shopNameInput').value.trim();
      if (!name) return;
      const { error } = await supabase.from('profiles').update({ shop_name: name }).eq('id', currentUser.id);
      if (error) { showToast(error.message); return; }
      await loadProfile();
      renderDashboard();
      showPage('dash');
    });

    // ─── Dashboard ───────────────────────────────────────────────────────
    function renderDashboard() {
      const shop = currentProfile?.shop_name || 'DawrBa';
      $('dashTitle').textContent = `DawrBa — ${shop}`;
      renderCustomerList();
    }

    let searchQuery = '';
    let sortValue = 'name-asc';

    $('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value.toLowerCase();
      renderCustomerList();
    });

    $('sortSelect').addEventListener('change', (e) => {
      sortValue = e.target.value;
      renderCustomerList();
    });

    async function loadCustomers() {
      const { data, error } = await supabase
        .from('customers')
        .select('id, name, phone, note, created_at')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });
      if (error) { showToast(error.message); return; }
      allCustomers = data || [];

      // Fetch balance for each
      for (const c of allCustomers) {
        const { data: txData } = await supabase
          .from('transactions')
          .select('amount')
          .eq('customer_id', c.id);
        c.balance = (txData || []).reduce((sum, t) => sum + (t.amount || 0), 0);
      }
    }

    function getFilteredSorted() {
      let list = [...allCustomers];
      if (searchQuery) {
        list = list.filter(c => c.name.toLowerCase().includes(searchQuery));
      }
      switch (sortValue) {
        case 'name-asc': list.sort((a, b) => a.name.localeCompare(b.name)); break;
        case 'name-desc': list.sort((a, b) => b.name.localeCompare(a.name)); break;
        case 'balance-desc': list.sort((a, b) => (b.balance || 0) - (a.balance || 0)); break;
        case 'balance-asc': list.sort((a, b) => (a.balance || 0) - (b.balance || 0)); break;
        case 'newest': list.sort((a, b) => new Date(b.created_at) - new Date(a.created_at)); break;
        case 'oldest': list.sort((a, b) => new Date(a.created_at) - new Date(b.created_at)); break;
      }
      return list;
    }

    function renderCustomerList() {
      const container = $('customerList');
      const list = getFilteredSorted();

      if (list.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <i class="fa-solid fa-users-slash"></i>
            <p>${searchQuery ? 'No customers match your search.' : 'No customers yet. Tap + to add one.'}</p>
          </div>`;
        return;
      }

      container.innerHTML = list.map(c => {
        const bal = c.balance || 0;
        const initial = c.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        return `
          <div class="customer-card" data-id="${c.id}">
            <div class="cc-left">
              <div class="avatar">${initial}</div>
              <div>
                <div class="cc-name">${escHtml(c.name)}</div>
                <div class="cc-meta">${c.phone ? c.phone : ''}</div>
              </div>
            </div>
            <div class="cc-balance ${bal <= 0 ? 'zero' : ''}">${bal <= 0 ? '₹0' : '₹' + bal.toLocaleString('en-IN')}</div>
          </div>`;
      }).join('');

      container.querySelectorAll('.customer-card').forEach(el => {
        el.addEventListener('click', () => openDetail(el.dataset.id));
      });
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // ─── Navigation ──────────────────────────────────────────────────────
    $('addCustomerBtn').addEventListener('click', () => {
      $('addForm').reset();
      $('addExtra').classList.remove('show');
      showPage('add');
    });

    $('addBackBtn').addEventListener('click', () => {
      renderDashboard();
      showPage('dash');
    });

    $('addExtraToggle').addEventListener('click', () => {
      $('addExtra').classList.toggle('show');
    });

    // ─── Add Customer ────────────────────────────────────────────────────
    $('addForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = $('addName').value.trim();
      const phone = $('addPhone').value.trim();
      const amount = parseFloat($('addAmount').value) || 0;
      const note = $('addNote').value.trim();
      const btn = $('addSubmitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const { data: customer, error } = await supabase
          .from('customers')
          .insert({ user_id: currentUser.id, name, phone })
          .select()
          .single();
        if (error) throw error;

        if (amount > 0) {
          const { error: txErr } = await supabase
            .from('transactions')
            .insert({ customer_id: customer.id, amount, note });
          if (txErr) throw txErr;
        }

        showToast(`${name} added`);
        await loadCustomers();
        renderDashboard();
        showPage('dash');
      } catch (err) {
        showToast(err.message);
      }
      btn.disabled = false;
      btn.textContent = 'Save Customer';
    });

    // ─── Customer Detail ─────────────────────────────────────────────────
    async function openDetail(id) {
      selectedCustomerId = id;
      const c = allCustomers.find(x => x.id === id);
      if (!c) return;
      $('detailName').textContent = c.name;
      $('detailPhone').textContent = c.phone || 'No phone';
      renderDetailBalance();
      await renderTransactions();
      showPage('detail');
    }

    function renderDetailBalance() {
      const c = allCustomers.find(x => x.id === selectedCustomerId);
      const bal = c ? (c.balance || 0) : 0;
      const el = $('detailBalance');
      el.textContent = '₹' + bal.toLocaleString('en-IN');
      el.className = 'detail-balance' + (bal <= 0 ? ' zero' : '');
    }

    async function renderTransactions() {
      const container = $('txList');
      const { data, error } = await supabase
        .from('transactions')
        .select('*')
        .eq('customer_id', selectedCustomerId)
        .order('date', { ascending: false })
        .order('created_at', { ascending: false });
      if (error) { container.innerHTML = '<p style="color:var(--red)">Error loading transactions</p>'; return; }

      if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty"><p>No transactions yet.</p></div>';
        return;
      }

      container.innerHTML = data.map(t => {
        const isCredit = t.amount > 0;
        return `
          <div class="tx-item">
            <div class="tx-left">
              <div class="tx-icon ${isCredit ? 'credit' : 'pay'}">
                <i class="fa-solid ${isCredit ? 'fa-plus' : 'fa-minus'}"></i>
              </div>
              <div>
                <div class="tx-note">${t.note || (isCredit ? 'Credit' : 'Payment')}</div>
                <div class="tx-date">${formatDate(t.date)}</div>
              </div>
            </div>
            <div class="tx-amount ${isCredit ? 'credit' : 'pay'}">${isCredit ? '+' : '-'}₹${Math.abs(t.amount).toLocaleString('en-IN')}</div>
          </div>`;
      }).join('');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    $('detailBackBtn').addEventListener('click', () => {
      renderDashboard();
      showPage('dash');
    });

    // ─── Transaction Modal ───────────────────────────────────────────────
    const txModal = $('txModal');

    function openTxModal(mode) {
      txMode = mode;
      $('txModalTitle').textContent = mode === 'credit' ? 'Add Credit' : 'Make Payment';
      $('txForm').reset();
      txModal.classList.add('active');
    }

    function closeTxModal() {
      txModal.classList.remove('active');
    }

    $('addCreditBtn').addEventListener('click', () => openTxModal('credit'));
    $('payBtn').addEventListener('click', () => openTxModal('pay'));
    $('closeTxModal').addEventListener('click', closeTxModal);
    txModal.addEventListener('click', (e) => { if (e.target === txModal) closeTxModal(); });

    $('txForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const amount = parseFloat($('txAmount').value);
      const note = $('txNote').value.trim();
      if (!amount || amount <= 0) return;

      const finalAmount = txMode === 'pay' ? -amount : amount;
      const btn = $('txSubmitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      const { error } = await supabase
        .from('transactions')
        .insert({ customer_id: selectedCustomerId, amount: finalAmount, note });
      if (error) { showToast(error.message); btn.disabled = false; btn.textContent = 'Save'; return; }

      closeTxModal();
      await loadCustomers();
      renderDetailBalance();
      await renderTransactions();
      showToast(txMode === 'credit' ? 'Credit added' : 'Payment recorded');
      btn.disabled = false;
      btn.textContent = 'Save';
    });

    // ─── WhatsApp ────────────────────────────────────────────────────────
    $('whatsappBtn').addEventListener('click', () => {
      const c = allCustomers.find(x => x.id === selectedCustomerId);
      if (!c || !c.phone) { showToast('No phone number for this customer'); return; }
      const phone = c.phone.replace(/[^0-9]/g, '');
      const bal = (c.balance || 0).toLocaleString('en-IN');
      const msg = `Hi ${c.name}, this is a friendly reminder about your pending balance of ₹${bal}. Please clear it at your earliest convenience. — ${currentProfile?.shop_name || 'DawrBa'}`;
      window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    });

    // ─── Init ────────────────────────────────────────────────────────────
    checkSession();
  </script>
</body>
</html>
