<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DawrBa — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 12px 32px rgba(15,23,42,0.08);
      padding: 48px 36px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      border: 1px solid #e2e8f0;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #1e293b;
      margin-bottom: 24px;
    }
    .logo .dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #2563eb;
      margin: 0 2px 2px 4px;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.2);
    }
    .icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.5rem;
      color: #2563eb;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 10px;
    }
    p {
      font-size: 0.95rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .bar {
      width: 60px; height: 4px;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
      border-radius: 4px;
      margin: 0 auto 28px;
    }
    .email {
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .email a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }
    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">DawrBa<span class="dot"></span></div>
    <div class="icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
    </div>
    <h1>Under Construction</h1>
    <div class="bar"></div>
    <p>We're building something for small shop owners to track credit and get paid faster. Be the first to know when we launch.</p>
    <div class="email">Get updates &rarr; <a href="mailto:hello@dawrba.enga.in">hello@dawrba.enga.in</a></div>
  </div>
</body>
</html>
